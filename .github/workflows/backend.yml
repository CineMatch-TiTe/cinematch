name: CI

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
    branches:
      - main
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend.yml"
    branches:
      - main

jobs:
  build:
    name: Build backend
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
        
      - name: Install cargo-chef
        run: cargo install cargo-chef

      - name: build with chef
        run: |
          cargo chef prepare --recipe-path recipe.json
          cargo chef cook --recipe-path recipe.json
          cargo build --release

  lint:
    name: Lint & Code Analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
      
      - name: Run clippy with JSON output
        run: |
          cargo clippy --all-targets --all-features --message-format=json > clippy-report.json 2>&1 || true
      
      - name: Run fmt check
        run: cargo fmt -- --check
      
      - name: Upload clippy report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: clippy-report
          path: clippy-report.json
          retention-days: 30
      
      - name: Comment on PR with clippy results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const report = fs.readFileSync('clippy-report.json', 'utf8');
              const lines = report.split('\n').filter(line => line.trim());
              const messages = lines
                .map(line => {
                  try { return JSON.parse(line); } catch { return null; }
                })
                .filter(msg => msg && msg.message && msg.message.level === 'warning');
              
              if (messages.length > 0) {
                const comment = `## 🔍 Clippy Analysis\n\nFound ${messages.length} clippy warnings:\n\n` +
                  messages.slice(0, 10).map(m => `- ${m.message.message}`).join('\n') +
                  (messages.length > 10 ? `\n\n... and ${messages.length - 10} more` : '');
                github.rest.issues.createComment({
                  issue_number: context.issue.number,
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  body: comment
                });
              }
            } catch (e) {
              console.log('Could not parse clippy report');
            }