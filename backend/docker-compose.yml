
networks:
  db_network:
    driver: bridge
    internal: true
  internet:

services:
  cinematch-server:
    image: ghcr.io/cinematch-tite/react_hackathon_2026-backend:pr-9
    ports:
      - "8085:8085"
    environment:
      - DATABASE_URL=postgres://cinematch_user:password@cinematch-db:5432/cinematch
      - REDIS_URL=redis://cinematch-redis:6379
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      - cinematch-db
      - cinematch-redis
      - qdrant
    networks:
      - db_network
      - internet
    env_file:
      - .env

  cinematch-db:
    image: postgres:15
    environment:
      - POSTGRES_USER=cinematch_user
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=cinematch
    ports:
      - "5432:5432"
    volumes:
      - cinematch_db_data:/var/lib/postgresql/data
    networks:
      - db_network
      - internet

  cinematch-redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - cinematch_redis_data:/data
    networks:
      - db_network
      - internet

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      - QDRANT_API_KEY=
    networks:
      - db_network
      - internet

volumes:
  cinematch_db_data:
  cinematch_redis_data:
  qdrant_storage:
  ollama_data: